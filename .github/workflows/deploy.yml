name: Build and Release Linux

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            build-essential \
            cmake \
            libuv1-dev \
            libssl-dev \
            libhwloc-dev

      - name: Configure and build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          cp src/xmrig ../
          cp src/config.json ../
          cd ..
          # 打包成压缩文件，格式建议为：xmrig-版本-linux-x64.tar.gz
          tar -czf xmrig-${{ github.ref_name }}-linux-x64.tar.gz xmrig config.json

      - name: Upload build artifact (for job reuse)
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-linux-build
          path: xmrig-${{ github.ref_name }}-linux-x64.tar.gz

  create-release:
    name: Create GitHub Release
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: xmrig-linux-build

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: xmrig-${{ github.ref_name }}-linux-x64.tar.gz
          generate_release_notes: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
